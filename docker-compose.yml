version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: airquality_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: airquality_db
      MYSQL_USER: airquality_user
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: airquality_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: airquality_user
      DB_PASSWORD: changeme
      DB_NAME: airquality_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
